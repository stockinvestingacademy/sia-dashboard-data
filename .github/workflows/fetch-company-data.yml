name: Fetch Company Data

on:
  schedule:
    - cron: '30 11 * * *' # runs every day at 11:30 UTC = 13:30 Copenhagen summer / 12:30 Copenhagen winter
  workflow_dispatch:       # adds a manual "Run workflow" button in GitHub

jobs:
  fetch-company-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data from Airtable
        env:
          COMPANY_AIRTABLE_TOKEN: ${{ secrets.COMPANY_AIRTABLE_TOKEN }}
          COMPANY_AIRTABLE_BASE:  ${{ secrets.COMPANY_AIRTABLE_BASE }}
        run: node fetch-company-data.js

      - name: Save updated data file to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sia-company-data.json
          git diff --staged --quiet || git commit -m "Update company data $(date -u +'%Y-%m-%d')"
          git push
